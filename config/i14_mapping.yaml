# Field mapping for Diamond I14 NeXus files.
#
# Each entry can be:
#   field: /hdf5/path                        # bare path
#   field:
#     path: /hdf5/path                       # path + options
#     default: <value>                       # fallback if key absent
#     value: <value>                         # hard override (ignores file)
#     scale: <float>                         # multiply raw value by this
#     transform: <name>                      # named unit conversion
#
# Built-in transforms: mm_to_m, um_to_m, nm_to_m, pm_to_m,
#                      ev_to_kev, kev_to_ev, deg_to_rad, rad_to_deg

frames:
  path: /entry/instrument/merlin/data
  keep_array: true

beam_energy:
  path: /entry/instrument/monochromator/energy   # keV — already correct unit
  default: 12.0

# Distance stored in mm in the NeXus file → convert to m
detector_distance:
  path: /entry/instrument/merlin/distance
  transform: mm_to_m
  default: 2.0                                   # default 2 m if absent

# Pixel size stored in µm → convert to m
pixel_size:
  path: /entry/instrument/merlin/pixel_size
  transform: um_to_m
  default: 55.0                                  # Merlin default 55 µm

# Scan steps stored in µm → convert to m
scan_step_x:
  path: /entry/scan/sample_x/step_size
  transform: um_to_m

scan_step_y:
  path: /entry/scan/sample_y/step_size
  transform: um_to_m
